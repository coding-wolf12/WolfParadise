<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolf Paradise - One spot for your every problem</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="img/lgo.png" type="image/x-icon">
</head>
<body>
    <nav>
        <div class="main-nav">
            <div class="left-nav">
                <div class="logo">
                    <img src="img/writelogo.png" alt="official logo">
                </div>
                <a href="#" class="hover"><span>Home</span></a>
                <a href="#" class="hover">About</a>
                <a href="#" class="hover">Contact</a>
                <a href="#" class="hover"><img src="img/sub.png" alt=""><h3>Subscription</h3></a>
            </div>
            <div class="right-nav">
                <a href="#" class="circular" id="search-tool"><img src="img/search.png" alt="" width="20px" height="20px"></a>
                <a href="#" class="circular"><img src="img/user.png" alt="" width="32px" height="32px"></a>
                <a href="login.html" class="btn">Join Us</a>
            </div>
        </div>
    </nav>
    <div id="container">
        <div class="search-bar">
            <input type="text" placeholder="Search">
            <img src="img/search.png" alt="Search" width="20px" height="20px">
        </div>
    </div>
    <script>
        const searchBar = document.getElementById('container');
        const searchTool = document.getElementById('search-tool')
        searchTool.addEventListener("mouseenter", () => {
            searchBar.style.display = 'block';
        });
        searchTool.addEventListener("mouseleave", () => {
            searchBar.style.display = 'none'
        })
    </script>
</body>
</html>
